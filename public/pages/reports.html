<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - FinTrack</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 2rem; }
    .tab-btn { background: none; border: none; padding: 1rem 2rem; font-weight: 600; font-size: 0.9rem; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .report-controls { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .summary-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem; }
    .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .prop-bar { height: 4px; background: var(--primary); border-radius: 2px; margin-top: 4px; }
    .best-month { border-left: 4px solid gold; }
    .worst-month { border-left: 4px solid var(--danger); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; display: block; }
    @media (max-width: 768px) { .two-cols { grid-template-columns: 1fr; } }
    @media print {
      .sidebar, .mobile-bottom-nav, .top-header, .tabs, .report-controls, .btn { display: none !important; }
      .main-content { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <header class="top-header">
        <div class="d-flex align-center gap-2">
          <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fa-solid fa-bars"></i></button>
          <h2 style="font-size: 1.25rem;">Reports</h2>
        </div>
        <button class="btn btn-outline" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      </header>
      <div class="content-area">
        <div class="tabs">
          <button class="tab-btn active" data-tab="monthly">📅 Monthly Report</button>
          <button class="tab-btn" data-tab="annual">📆 Annual Report</button>
        </div>
        <div class="tab-content active" id="tab-monthly">
          <div class="report-controls">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Select Month</label>
              <input type="month" id="monthlyPicker" class="form-control" style="width:auto;">
            </div>
            <button class="btn btn-primary" id="generateMonthlyBtn"><i class="fa-solid fa-chart-bar"></i> Generate</button>
          </div>
          <div id="monthlyReportContent">
            <div class="empty-state"><i class="fa-solid fa-chart-bar"></i><p>Select a month and generate your report.</p></div>
          </div>
        </div>
        <div class="tab-content" id="tab-annual">
          <div class="report-controls">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Select Year</label>
              <input type="number" id="yearPicker" class="form-control" style="width:120px;" min="2020" max="2035">
            </div>
            <button class="btn btn-primary" id="generateAnnualBtn"><i class="fa-solid fa-chart-line"></i> Generate</button>
          </div>
          <div id="annualReportContent">
            <div class="empty-state"><i class="fa-solid fa-chart-line"></i><p>Select a year and generate your report.</p></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/reports.js"></script>
</body>
</html>
